<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encoder / Hasher</title>
  <style>
    /* Inter */
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400 600; font-display: swap; src: url('fonts/inter-latin.woff2') format('woff2'); unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400 600; font-display: swap; src: url('fonts/inter-latin-ext.woff2') format('woff2'); unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400 600; font-display: swap; src: url('fonts/inter-cyrillic.woff2') format('woff2'); unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116; }
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 400 600; font-display: swap; src: url('fonts/inter-cyrillic-ext.woff2') format('woff2'); unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F; }
    /* JetBrains Mono */
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400 500; font-display: swap; src: url('fonts/jbmono-latin.woff2') format('woff2'); unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
    @font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400 500; font-display: swap; src: url('fonts/jbmono-cyrillic.woff2') format('woff2'); unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116; }

    html, [data-theme="light"] {
      --bg:      #f6f8fa;
      --bg2:     #ffffff;
      --bg3:     #f0f2f5;
      --border:  #d0d7de;
      --text:    #111827;
      --dim:     #6b7280;
      --accent:  #2563eb;
      --green:   #16a34a;
      --red:     #dc2626;
      --mono-bg: #f9fafb;
    }

    [data-theme="dark"] {
      --bg:      #0f1117;
      --bg2:     #161b27;
      --bg3:     #1e2535;
      --border:  #2a3147;
      --text:    #e2e8f0;
      --dim:     #7c8aa0;
      --accent:  #4f8ef7;
      --green:   #34d399;
      --red:     #f87171;
      --mono-bg: #0d1117;
    }

    [data-theme="fallout"] {
      --bg:      #060a04;
      --bg2:     #0c1108;
      --bg3:     #141f0e;
      --border:  #1f3314;
      --text:    #a8e060;
      --dim:     #4a7a28;
      --accent:  #4af626;
      --green:   #4af626;
      --red:     #e8a020;
      --mono-bg: #060a04;
    }

    [data-theme="monokai"] {
      --bg:      #1a1b16;
      --bg2:     #23241e;
      --bg3:     #2d2e26;
      --border:  #3a3c30;
      --text:    #f8f8f2;
      --dim:     #75715e;
      --accent:  #a6e22e;
      --green:   #a6e22e;
      --red:     #f92672;
      --mono-bg: #1a1b16;
    }

    [data-theme="nord"] {
      --bg:      #242933;
      --bg2:     #2e3440;
      --bg3:     #3b4252;
      --border:  #434c5e;
      --text:    #eceff4;
      --dim:     #9099a8;
      --accent:  #88c0d0;
      --green:   #a3be8c;
      --red:     #bf616a;
      --mono-bg: #242933;
    }

    [data-theme="github"] {
      --bg:      #ffffff;
      --bg2:     #f6f8fa;
      --bg3:     #eaeef2;
      --border:  #d0d7de;
      --text:    #24292f;
      --dim:     #656d76;
      --accent:  #0969da;
      --green:   #1a7f37;
      --red:     #cf222e;
      --mono-bg: #f6f8fa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Mode tabs ── */
    .mode-tabs {
      display: flex;
      gap: 4px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
      align-items: center;
    }

    .mode-tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 5px 12px;
      border-radius: 7px;
      border: 1px solid transparent;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--dim);
      white-space: nowrap;
      transition: all 0.15s;
    }

    .tab:hover { background: var(--bg3); color: var(--text); }

    .tab.active {
      background: var(--bg3);
      border-color: var(--border);
      color: var(--accent);
      font-weight: 600;
    }

    .tab-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 2px;
    }

    /* ── Header right ── */
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      padding: 6px 12px;
      border-radius: 7px;
      border: 1px solid var(--border);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      background: transparent;
      color: var(--dim);
    }

    .btn:hover { background: var(--bg3); color: var(--text); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-primary:hover { opacity: 0.88; }

    .btn-disabled, .btn-primary.btn-disabled {
      opacity: 0.4 !important;
      cursor: not-allowed !important;
      pointer-events: none !important;
    }

    .btn-copied {
      color: var(--green) !important;
      border-color: var(--green) !important;
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ── Panel ── */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 0 16px;
      height: 42px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .panel-actions { display: flex; gap: 6px; align-items: center; }

    textarea {
      flex: 1;
      width: 100%;
      padding: 16px 20px;
      background: var(--bg2);
      border: none;
      outline: none;
      resize: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--dim); }

    .output-area {
      flex: 1;
      padding: 16px 20px;
      background: var(--mono-bg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      overflow-y: auto;
      word-break: break-all;
      white-space: pre-wrap;
      user-select: text;
    }

    .output-area.empty { color: var(--dim); font-style: italic; }

    /* hash single line */
    .output-area.hash {
      font-size: 14px;
      letter-spacing: 0.04em;
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: flex-start;
    }

    .hash-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      padding-right: 56px;
    }

    .hash-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .hash-value {
      color: var(--accent);
      word-break: break-all;
      font-size: 13px;
    }

    .hash-copy-btn {
      position: absolute;
      right: 0;
      top: 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--dim);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      padding: 2px 8px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, border-color 0.15s;
    }

    .hash-row:hover .hash-copy-btn { opacity: 1; }
    .hash-copy-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── output-meta ── */
    .output-meta {
      font-size: 11px;
      color: var(--dim);
    }

    /* ── JWT syntax highlight ── */
    .jt-key   { color: var(--accent); }
    .jt-str   { color: var(--green); }
    .jt-num   { color: var(--red); }
    .jt-bool  { color: var(--dim); font-style: italic; }
    .jt-cmt   { color: var(--dim); opacity: 0.6; }

    /* ── Status bar ── */
    .status-bar {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 4px 20px;
      font-size: 11px;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .status-ok   { color: var(--green); }
    .status-err  { color: var(--red); }

    /* ── Theme picker ── */
    .theme-picker { position: relative; }

    .theme-picker-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 10px;
      color: var(--dim);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .theme-picker-btn:hover,
    .theme-picker-btn.open { border-color: var(--accent); color: var(--text); }

    .tp-chevron { font-size: 8px; transition: transform 0.2s; }
    .theme-picker-btn.open .tp-chevron { transform: rotate(180deg); }

    .theme-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      z-index: 999;
      min-width: 210px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 3px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 0.15s, transform 0.15s;
    }

    .theme-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0); }

    .theme-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 8px;
      border-radius: 7px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }

    .theme-option:hover { background: var(--bg3); border-color: var(--border); }
    .theme-option.active { background: var(--bg3); border-color: var(--accent); }
    .to-preview { width: 38px; height: 24px; border-radius: 5px; overflow: hidden; position: relative; flex-shrink: 0; }
    .to-name { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
    .to-desc { font-size: 10px; color: var(--dim); }
    .to-check { font-size: 12px; color: var(--accent); opacity: 0; flex-shrink: 0; }
    .theme-option.active .to-check { opacity: 1; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Diff mode ── */
    .diff-container {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .diff-container.active { display: flex; }

    #diff-input-b {
      flex: 1;
      min-height: 60px;
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      background: var(--bg2);
      color: var(--text);
      border: none;
      border-bottom: 2px solid var(--border);
      outline: none;
      resize: none;
      overflow-y: auto;
    }
    #diff-input-b::placeholder { color: var(--dim); }

    .diff-result {
      flex: 1.4;
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      background: var(--mono-bg);
      color: var(--text);
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      user-select: text;
    }
    .diff-result.empty { color: var(--dim); font-style: italic; }

    /* stale banner via ::before */
    .diff-container.stale .diff-result::before {
      content: '⚠ Текст изменён — нажмите Сравнить';
      display: block;
      background: rgba(234,179,8,0.12);
      border: 1px solid rgba(234,179,8,0.4);
      border-radius: 6px;
      color: #d97706;
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      font-style: normal;
      font-weight: 500;
      padding: 4px 10px;
      margin-bottom: 12px;
      pointer-events: none;
    }

    .diff-ins {
      background: rgba(22,163,74,0.22);
      border-radius: 2px;
      outline: 1px solid rgba(22,163,74,0.3);
    }
    .diff-del {
      background: rgba(220,38,38,0.15);
      color: var(--red);
      text-decoration: line-through;
      text-decoration-color: var(--red);
      border-radius: 2px;
      outline: 1px solid rgba(220,38,38,0.3);
    }

    .diff-sep {
      display: block;
      margin: 12px 0 6px;
      color: var(--dim);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      font-style: normal;
      letter-spacing: 0.04em;
    }

    .diff-meta-ins { color: var(--green); font-weight: 600; }
    .diff-meta-del { color: var(--red);   font-weight: 600; }

    #btn-compare {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
    #btn-compare:hover { opacity: 0.88; }

    /* ── STATS COUNTER ── */
    .stats-pill {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 28px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0 10px;
      font-size: 11px;
      color: var(--dim);
      cursor: default;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }

    .stats-pill:hover { border-color: var(--accent); color: var(--text); }

    .stats-pill .sp-item { display: flex; align-items: center; gap: 4px; }

    .stats-pill .sp-sep { width: 1px; height: 12px; background: var(--border); }

    .stats-pill .sp-val { font-weight: 600; font-size: 12px; color: var(--text); }

    .stats-pill .sp-ico { font-size: 10px; opacity: 0.6; }

    .stats-tooltip {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 190px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 200;
      opacity: 0;
      transform: translateY(-4px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s cubic-bezier(.4,0,.2,1);
      white-space: nowrap;
    }

    .stats-pill:hover .stats-tooltip { opacity: 1; transform: none; }

    .stats-tooltip .st-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
    }

    .stats-tooltip .st-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 3px 0;
      font-size: 11px;
      color: var(--dim);
    }

    .stats-tooltip .st-row:not(:last-child) { border-bottom: 1px solid var(--border); }

    .stats-tooltip .st-row .st-num { font-weight: 600; color: var(--text); font-size: 12px; }

    .stats-tooltip .st-section-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 10px;
      margin-bottom: 4px;
    }
  </style>
  <script src="vendor/crypto-js.min.js"></script>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    Encoder
  </div>

  <div class="mode-tabs" id="mode-tabs">
    <button class="tab active" data-mode="base64-enc">Base64 Enc</button>
    <button class="tab" data-mode="base64-dec">Base64 Dec</button>
    <div class="tab-sep"></div>
    <button class="tab" data-mode="url-enc">URL Enc</button>
    <button class="tab" data-mode="url-dec">URL Dec</button>
    <div class="tab-sep"></div>
    <button class="tab" data-mode="hash">Hash</button>
    <div class="tab-sep"></div>
    <button class="tab" data-mode="hex-enc">HEX Enc</button>
    <button class="tab" data-mode="hex-dec">HEX Dec</button>
    <div class="tab-sep"></div>
    <button class="tab" data-mode="jwt">JWT Dec</button>
    <div class="tab-sep"></div>
    <button class="tab" data-mode="ascii-dec">ASCII → Text</button>
    <div class="tab-sep"></div>
    <button class="tab" data-mode="diff">Diff</button>
  </div>

  <div class="header-right">
    <div class="stats-pill" id="statsPill">
      <span class="sp-item"><span class="sp-ico">👤</span><span class="sp-val" id="spUsers">0</span></span>
      <span class="sp-sep"></span>
      <span class="sp-item"><span class="sp-ico">🔄</span><span class="sp-val" id="spSessions">0</span></span>
      <span class="sp-sep"></span>
      <span class="sp-item"><span class="sp-ico">⚡</span><span class="sp-val" id="spUsages">0</span></span>
      <div class="stats-tooltip">
        <div class="st-title">Статистика</div>
        <div class="st-row"><span class="st-label">Пользователи</span><span class="st-num" id="stUsers">0</span></div>
        <div class="st-row"><span class="st-label">Сессии</span><span class="st-num" id="stSessions">0</span></div>
        <div class="st-row"><span class="st-label">Всего действий</span><span class="st-num" id="stTotal">0</span></div>
        <div class="st-section-title">По режимам</div>
        <div class="st-row"><span class="st-label">Base64 Enc</span><span class="st-num" id="st-base64-enc">0</span></div>
        <div class="st-row"><span class="st-label">Base64 Dec</span><span class="st-num" id="st-base64-dec">0</span></div>
        <div class="st-row"><span class="st-label">URL Enc</span><span class="st-num" id="st-url-enc">0</span></div>
        <div class="st-row"><span class="st-label">URL Dec</span><span class="st-num" id="st-url-dec">0</span></div>
        <div class="st-row"><span class="st-label">Hash</span><span class="st-num" id="st-hash">0</span></div>
        <div class="st-row"><span class="st-label">HEX Enc</span><span class="st-num" id="st-hex-enc">0</span></div>
        <div class="st-row"><span class="st-label">HEX Dec</span><span class="st-num" id="st-hex-dec">0</span></div>
        <div class="st-row"><span class="st-label">JWT Dec</span><span class="st-num" id="st-jwt">0</span></div>
        <div class="st-row"><span class="st-label">ASCII → Text</span><span class="st-num" id="st-ascii-dec">0</span></div>
        <div class="st-row"><span class="st-label">Diff</span><span class="st-num" id="st-diff">0</span></div>
      </div>
    </div>
    <div class="theme-picker" id="themePicker">
      <button class="theme-picker-btn" id="themePickerBtn">

<script>
// ── MD5 (pure JS) ──────────────────────────────────────────────────────────
function md5(str) {
  function safeAdd(x, y) { const lsw = (x & 0xffff) + (y & 0xffff); const msw = (x >> 16) + (y >> 16) + (lsw >> 16); return (msw << 16) | (lsw & 0xffff); }
  function bitRotateLeft(num, cnt) { return (num << cnt) | (num >>> (32 - cnt)); }
  function md5cmn(q, a, b, x, s, t) { return safeAdd(bitRotateLeft(safeAdd(safeAdd(a, q), safeAdd(x, t)), s), b); }
  function md5ff(a,b,c,d,x,s,t){return md5cmn((b&c)|((~b)&d),a,b,x,s,t);}
  function md5gg(a,b,c,d,x,s,t){return md5cmn((b&d)|(c&(~d)),a,b,x,s,t);}
  function md5hh(a,b,c,d,x,s,t){return md5cmn(b^c^d,a,b,x,s,t);}
  function md5ii(a,b,c,d,x,s,t){return md5cmn(c^(b|(~d)),a,b,x,s,t);}

  const bytes = unescape(encodeURIComponent(str));
  const arr = [];
  for (let i = 0; i < bytes.length; i++) arr.push(bytes.charCodeAt(i));
  arr.push(0x80);
  while (arr.length % 64 !== 56) arr.push(0);
  const len = bytes.length * 8;
  arr.push(len & 0xff, (len >> 8) & 0xff, (len >> 16) & 0xff, (len >> 24) & 0xff, 0, 0, 0, 0);

  const words = [];
  for (let i = 0; i < arr.length; i += 4)
    words.push(arr[i] | (arr[i+1] << 8) | (arr[i+2] << 16) | (arr[i+3] << 24));

  let a = 0x67452301, b = 0xefcdab89, c = 0x98badcfe, d = 0x10325476;
  for (let i = 0; i < words.length; i += 16) {
    const [A,B,C,D] = [a,b,c,d];
    a=md5ff(a,b,c,d,words[i+0],7,-680876936);d=md5ff(d,a,b,c,words[i+1],12,-389564586);c=md5ff(c,d,a,b,words[i+2],17,606105819);b=md5ff(b,c,d,a,words[i+3],22,-1044525330);
    a=md5ff(a,b,c,d,words[i+4],7,-176418897);d=md5ff(d,a,b,c,words[i+5],12,1200080426);c=md5ff(c,d,a,b,words[i+6],17,-1473231341);b=md5ff(b,c,d,a,words[i+7],22,-45705983);
    a=md5ff(a,b,c,d,words[i+8],7,1770035416);d=md5ff(d,a,b,c,words[i+9],12,-1958414417);c=md5ff(c,d,a,b,words[i+10],17,-42063);b=md5ff(b,c,d,a,words[i+11],22,-1990404162);
    a=md5ff(a,b,c,d,words[i+12],7,1804603682);d=md5ff(d,a,b,c,words[i+13],12,-40341101);c=md5ff(c,d,a,b,words[i+14],17,-1502002290);b=md5ff(b,c,d,a,words[i+15],22,1236535329);
    a=md5gg(a,b,c,d,words[i+1],5,-165796510);d=md5gg(d,a,b,c,words[i+6],9,-1069501632);c=md5gg(c,d,a,b,words[i+11],14,643717713);b=md5gg(b,c,d,a,words[i+0],20,-373897302);
    a=md5gg(a,b,c,d,words[i+5],5,-701558691);d=md5gg(d,a,b,c,words[i+10],9,38016083);c=md5gg(c,d,a,b,words[i+15],14,-660478335);b=md5gg(b,c,d,a,words[i+4],20,-405537848);
    a=md5gg(a,b,c,d,words[i+9],5,568446438);d=md5gg(d,a,b,c,words[i+14],9,-1019803690);c=md5gg(c,d,a,b,words[i+3],14,-187363961);b=md5gg(b,c,d,a,words[i+8],20,1163531501);
    a=md5gg(a,b,c,d,words[i+13],5,-1444681467);d=md5gg(d,a,b,c,words[i+2],9,-51403784);c=md5gg(c,d,a,b,words[i+7],14,1735328473);b=md5gg(b,c,d,a,words[i+12],20,-1926607734);
    a=md5hh(a,b,c,d,words[i+5],4,-378558);d=md5hh(d,a,b,c,words[i+8],11,-2022574463);c=md5hh(c,d,a,b,words[i+11],16,1839030562);b=md5hh(b,c,d,a,words[i+14],23,-35309556);
    a=md5hh(a,b,c,d,words[i+1],4,-1530992060);d=md5hh(d,a,b,c,words[i+4],11,1272893353);c=md5hh(c,d,a,b,words[i+7],16,-155497632);b=md5hh(b,c,d,a,words[i+10],23,-1094730640);
    a=md5hh(a,b,c,d,words[i+13],4,681279174);d=md5hh(d,a,b,c,words[i+0],11,-358537222);c=md5hh(c,d,a,b,words[i+3],16,-722521979);b=md5hh(b,c,d,a,words[i+6],23,76029189);
    a=md5hh(a,b,c,d,words[i+9],4,-640364487);d=md5hh(d,a,b,c,words[i+12],11,-421815835);c=md5hh(c,d,a,b,words[i+15],16,530742520);b=md5hh(b,c,d,a,words[i+2],23,-995338651);
    a=md5ii(a,b,c,d,words[i+0],6,-198630844);d=md5ii(d,a,b,c,words[i+7],10,1126891415);c=md5ii(c,d,a,b,words[i+14],15,-1416354905);b=md5ii(b,c,d,a,words[i+5],21,-57434055);
    a=md5ii(a,b,c,d,words[i+12],6,1700485571);d=md5ii(d,a,b,c,words[i+3],10,-1894986606);c=md5ii(c,d,a,b,words[i+10],15,-1051523);b=md5ii(b,c,d,a,words[i+1],21,-2054922799);
    a=md5ii(a,b,c,d,words[i+8],6,1873313359);d=md5ii(d,a,b,c,words[i+15],10,-30611744);c=md5ii(c,d,a,b,words[i+6],15,-1560198380);b=md5ii(b,c,d,a,words[i+13],21,1309151649);
    a=md5ii(a,b,c,d,words[i+4],6,-145523070);d=md5ii(d,a,b,c,words[i+11],10,-1120210379);c=md5ii(c,d,a,b,words[i+2],15,718787259);b=md5ii(b,c,d,a,words[i+9],21,-343485551);
    a=safeAdd(a,A); b=safeAdd(b,B); c=safeAdd(c,C); d=safeAdd(d,D);
  }

  const buf = new ArrayBuffer(16);
  const view = new DataView(buf);
  [a,b,c,d].forEach((v,i) => view.setInt32(i*4, v, true));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── SHA via CryptoJS ───────────────────────────────────────────────────────
function sha(algorithm, str) {
  switch (algorithm) {
    case 'SHA-1':   return CryptoJS.SHA1(str).toString(CryptoJS.enc.Hex);
    case 'SHA-256': return CryptoJS.SHA256(str).toString(CryptoJS.enc.Hex);
    case 'SHA-512': return CryptoJS.SHA512(str).toString(CryptoJS.enc.Hex);
  }
}

// ── Modes ──────────────────────────────────────────────────────────────────
const MODES = {
  'base64-enc': { inputLabel: 'Plain text', outputLabel: 'Base64',      hashMode: false },
  'base64-dec': { inputLabel: 'Base64',     outputLabel: 'Plain text',  hashMode: false },
  'url-enc':    { inputLabel: 'Plain text', outputLabel: 'URL encoded', hashMode: false },
  'url-dec':    { inputLabel: 'URL encoded',outputLabel: 'Plain text',  hashMode: false },
  'hash':       { inputLabel: 'Input text', outputLabel: 'Hashes',      hashMode: true  },
  'hex-enc':    { inputLabel: 'Plain text', outputLabel: 'HEX',         hashMode: false },
  'hex-dec':    { inputLabel: 'HEX',        outputLabel: 'Plain text',  hashMode: false },
  'jwt':        { inputLabel: 'JWT token',  outputLabel: 'Decoded JWT', hashMode: false },
  'ascii-dec':  { inputLabel: 'ASCII codes', outputLabel: 'Text',       hashMode: false },
  'diff':       { inputLabel: 'Text A',     outputLabel: 'Text B',     hashMode: false },
};

let currentMode = 'base64-enc';
const input  = document.getElementById('input');
const output = document.getElementById('output');

async function convert() {
  const val = input.value;
  document.getElementById('char-count').textContent = val.length ? `${val.length} chars` : '';

  if (!val.trim()) {
    setOutput('', true);
    setStatus('Ready');
    return;
  }

  try {
    let result = '';
    switch (currentMode) {
      case 'base64-enc':
        result = btoa(unescape(encodeURIComponent(val)));
        break;

      case 'base64-dec': {
        const cleaned = val.trim().replace(/\s/g, '');
        if (!/^[A-Za-z0-9+/]*={0,2}$/.test(cleaned)) {
          throw new Error('Invalid Base64 — input contains non-Base64 characters. To encode text, use "Base64 Enc" mode.');
        }
        const raw = atob(cleaned);
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
        const isBinary = bytes.some(b => b < 9 || (b > 13 && b < 32));
        if (isBinary) {
          const mime = detectMime(bytes);
          window._lastBytes = { bytes, mime };
          const ext = mime.split('/')[1]?.replace('jpeg','jpg') || 'bin';
          setOutput(`[Binary file detected: ${mime}]\nSize: ${bytes.length} bytes — use "Save file" to download`, false);
          document.getElementById('output-meta').textContent = `${bytes.length} bytes · ${ext.toUpperCase()}`;
          document.getElementById('btn-save-file').style.display = '';
          setStatus('OK — binary');
          window._statsTrack?.('base64-dec');
          return;
        }
        window._lastBytes = null;
        document.getElementById('btn-save-file').style.display = 'none';
        result = new TextDecoder().decode(bytes);
        break;
      }

      case 'url-enc':
        result = encodeURIComponent(val);
        break;

      case 'url-dec':
        result = decodeURIComponent(val);
        break;

      case 'hex-enc':
        result = Array.from(new TextEncoder().encode(val))
          .map(b => b.toString(16).padStart(2,'0')).join(' ');
        break;

      case 'hex-dec': {
        const hex = val.replace(/\s+/g, '');
        if (!/^[0-9a-fA-F]*$/.test(hex)) throw new Error('Invalid hex — only 0–9 and A–F allowed');
        if (hex.length % 2 !== 0) throw new Error('Odd hex length');
        const bytes = [];
        for (let i = 0; i < hex.length; i += 2) bytes.push(parseInt(hex.slice(i,i+2), 16));
        result = new TextDecoder().decode(new Uint8Array(bytes));
        break;
      }

      case 'hash': {
        const m    = md5(val);
        const s1   = sha('SHA-1', val);
        const s256 = sha('SHA-256', val);
        const s512 = sha('SHA-512', val);
        renderHashes([
          { label: 'MD5',     value: m },
          { label: 'SHA-1',   value: s1 },
          { label: 'SHA-256', value: s256 },
          { label: 'SHA-512', value: s512 },
        ]);
        document.getElementById('output-meta').textContent = '';
        setStatus('OK — 4 algorithms');
        window._statsTrack?.('hash');
        return;
      }

      case 'ascii-dec': {
        const nums = val.trim().replace(/[,;]+/g, ' ').split(/\s+/).filter(Boolean);
        if (!nums.every(n => /^\d+$/.test(n))) throw new Error('Invalid input — use decimal ASCII codes separated by spaces or commas');
        const codes = nums.map(Number);
        const outOfRange = codes.find(n => n < 0 || n > 127);
        if (outOfRange !== undefined) throw new Error(`Value ${outOfRange} is out of ASCII range (0–127)`);
        result = codes.map(n => String.fromCharCode(n)).join('');
        break;
      }

      case 'jwt': {
        const parts = val.trim().split('.');
        if (parts.length < 2) throw new Error('Invalid JWT (need at least 2 parts)');
        const decode = p => JSON.parse(decodeURIComponent(escape(atob(p.replace(/-/g,'+').replace(/_/g,'/').padEnd(Math.ceil(p.length/4)*4,'=')))));
        const jwtHeader  = decode(parts[0]);
        const payload = decode(parts[1]);
        const raw = `// Header\n${JSON.stringify(jwtHeader, null, 2)}\n\n// Payload\n${JSON.stringify(payload, null, 2)}` +
          (parts.length === 3 ? `\n\n// Signature (not verified)\n${parts[2]}` : '');
        output.className = 'output-area';
        output.innerHTML = highlightJWT(raw);
        window._lastOutput = raw;
        document.getElementById('output-meta').textContent = `${parts.length} parts`;
        setStatus('OK — JWT decoded');
        window._statsTrack?.('jwt');
        return;
      }
    }

    setOutput(result, false);
    document.getElementById('output-meta').textContent = `${result.length} chars`;
    setStatus('OK');
    window._statsTrack?.(currentMode);

  } catch (e) {
    setOutput(`Error: ${e.message}`, false);
    document.getElementById('output-meta').textContent = '';
    setStatus('Error: ' + e.message, true);
  }
}

function renderHashes(hashes) {
  output.className = 'output-area hash';
  output.innerHTML = hashes.map(h => `
    <div class="hash-row">
      <div class="hash-label">${h.label}</div>
      <div class="hash-value">${h.value}</div>
      <button class="hash-copy-btn" data-val="${h.value}">Copy</button>
    </div>
  `).join('');
  output.querySelectorAll('.hash-copy-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      await copyToClipboard(btn.dataset.val);
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = 'Copy'; }, 1400);
    });
  });
  window._lastOutput = hashes.map(h => `${h.label}: ${h.value}`).join('\n');
}

function copyToClipboard(text) {
  if (navigator.clipboard?.writeText) return navigator.clipboard.writeText(text);
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch {}
  document.body.removeChild(ta);
  return Promise.resolve();
}

function detectMime(bytes) {
  const h = (i) => bytes[i];
  if (h(0)===0xFF && h(1)===0xD8 && h(2)===0xFF)            return 'image/jpeg';
  if (h(0)===0x89 && h(1)===0x50 && h(2)===0x4E && h(3)===0x47) return 'image/png';
  if (h(0)===0x47 && h(1)===0x49 && h(2)===0x46)            return 'image/gif';
  if (h(0)===0x25 && h(1)===0x50 && h(2)===0x44 && h(3)===0x46) return 'application/pdf';
  if (h(0)===0x50 && h(1)===0x4B && h(2)===0x03 && h(3)===0x04) return 'application/zip';
  if (h(0)===0x1F && h(1)===0x8B)                           return 'application/gzip';
  return 'application/octet-stream';
}

document.getElementById('btn-save-file').addEventListener('click', () => {
  if (!window._lastBytes) return;
  const { bytes, mime } = window._lastBytes;
  const ext = mime.split('/')[1]?.replace('jpeg','jpg').replace('octet-stream','bin') || 'bin';
  const blob = new Blob([bytes], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `decoded.${ext}`;
  a.click();
  URL.revokeObjectURL(a.href);
});

function highlightJWT(text) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc(text)
    .replace(/(\/\/[^\n]*)/g, '<span class="jt-cmt">$1</span>')
    .replace(/"([^"]+)"(\s*:)/g, '<span class="jt-key">"$1"</span>$2')
    .replace(/:\s*("(?:[^"\\]|\\.)*")/g, ': <span class="jt-str">$1</span>')
    .replace(/:\s*(-?\d+\.?\d*)/g, ': <span class="jt-num">$1</span>')
    .replace(/:\s*(true|false|null)/g, ': <span class="jt-bool">$1</span>');
}

function setOutput(text, isEmpty) {
  output.className = 'output-area' + (isEmpty ? ' empty' : '');
  output.textContent = isEmpty ? 'Result will appear here…' : text;
  window._lastOutput = isEmpty ? '' : text;
}

function setStatus(msg, isErr = false) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = isErr ? 'status-err' : (msg === 'Ready' ? '' : 'status-ok');
}

// ── Tab switching ──────────────────────────────────────────────────────────
document.getElementById('mode-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentMode = btn.dataset.mode;
  const m = MODES[currentMode];
  document.getElementById('input-label').textContent  = m.inputLabel;
  document.getElementById('output-label').textContent = m.outputLabel;
  document.getElementById('status-mode').textContent  = '· ' + btn.textContent;
  document.getElementById('btn-save-file').style.display = 'none';
  window._lastBytes = null;
  input.placeholder = m.hashMode ? 'Enter text to hash…' : 'Enter text here…';
  const swapBtn = document.getElementById('btn-swap');
  const noSwap = currentMode === 'hash' || currentMode === 'jwt' || currentMode === 'diff';
  swapBtn.classList.toggle('btn-disabled', noSwap);
  swapBtn.title = noSwap ? 'Swap недоступен для этого режима' : 'Use output as input for next operation';

  const isDiff = currentMode === 'diff';
  document.getElementById('normal-actions').style.display = isDiff ? 'none' : '';
  document.getElementById('diff-actions').style.display   = isDiff ? '' : 'none';
  document.getElementById('output').style.display         = isDiff ? 'none' : '';
  document.getElementById('diff-container').classList.toggle('active', isDiff);

  if (isDiff) {
    // reset overlay on mode switch
    const ov = document.getElementById('diff-overlay');
    if (ov) { ov.innerHTML = ''; ov.classList.remove('stale'); }
    document.getElementById('diff-meta').innerHTML = '';
    setStatus('Ready — введите тексты и нажмите Сравнить');
    document.getElementById('char-count').textContent = '';
  } else {
    convert();
  }
});

document.getElementById('status-mode').textContent = '· ' + (document.querySelector('.tab.active')?.textContent || '');

// ── Controls ───────────────────────────────────────────────────────────────
let _debounceTimer = null;
input.addEventListener('input', () => {
  if (currentMode === 'diff') {
    window._diffMarkStale?.();
  } else if (currentMode === 'hash') {
    clearTimeout(_debounceTimer);
    _debounceTimer = setTimeout(convert, 300);
  } else {
    convert();
  }
});

const EXAMPLES = {
  'base64-enc': 'Hello, World! 🌍\nThis is a Base64 encoding example.',
  'base64-dec': 'SGVsbG8sIFdvcmxkISBUaGlzIGlzIGEgQmFzZTY0IGRlY29kZSBleGFtcGxlLg==',
  'url-enc':    '/api/search?q=страховой полис&type=ОСАГО&from=2024-01-01&to=2024-12-31',
  'url-dec':    'https%3A%2F%2Fexample.com%2Fsearch%3Fq%3D%D0%BF%D1%80%D0%B8%D0%B2%D0%B5%D1%82%20%D0%BC%D0%B8%D1%80%26lang%3Dru',
  'hash':       'password123',
  'hex-enc':    'Hello, HEX!',
  'hex-dec':    '48 65 6c 6c 6f 2c 20 48 45 58 21',
  'jwt':        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c',
  'ascii-dec':  '72 101 108 108 111 44 32 87 111 114 108 100 33',
};

document.getElementById('btn-example').addEventListener('click', () => {
  input.value = EXAMPLES[currentMode] || '';
  convert();
  input.focus();
});

document.getElementById('btn-clear').addEventListener('click', () => {
  input.value = '';
  convert();
  input.focus();
});

document.getElementById('btn-paste').addEventListener('click', async () => {
  try {
    input.value = await navigator.clipboard.readText();
    convert();
  } catch {
    setStatus('Clipboard access denied — paste manually (Ctrl+V)', true);
    input.focus();
  }
});

document.getElementById('btn-copy').addEventListener('click', async () => {
  if (!window._lastOutput) return;
  await copyToClipboard(window._lastOutput);
  const btn = document.getElementById('btn-copy');
  btn.textContent = '✓ Copied';
  btn.classList.add('btn-copied');
  setTimeout(() => {
    btn.textContent = 'Copy';
    btn.classList.remove('btn-copied');
  }, 1500);
});

document.getElementById('btn-swap').addEventListener('click', () => {
  if (!window._lastOutput || currentMode === 'hash' || currentMode === 'jwt') return;
  input.value = window._lastOutput;
  convert();
});

// ── Theme picker ───────────────────────────────────────────────────────────
const THEMES = [
  { id: 'light',   name: 'Light',   desc: 'Светлая тема',    bg: '#f6f8fa', key: '#0369a1', str: '#16a34a', num: '#d97706' },
  { id: 'fallout', name: 'Fallout', desc: 'Терминал Убежища', bg: '#060a04', key: '#4af626', str: '#a8e060', num: '#7af040' },
  { id: 'dark',    name: 'Dark',    desc: 'Тёмная ночь',     bg: '#0f1117', key: '#7dd3fc', str: '#86efac', num: '#fdba74' },
  { id: 'monokai', name: 'Monokai', desc: 'Классика кода',   bg: '#1a1b16', key: '#66d9e8', str: '#e6db74', num: '#ae81ff' },
  { id: 'nord',    name: 'Nord',    desc: 'Северное сияние', bg: '#242933', key: '#88c0d0', str: '#a3be8c', num: '#b48ead' },
  { id: 'github',  name: 'GitHub',  desc: 'GitHub Light',    bg: '#ffffff', key: '#0550ae', str: '#0a3069', num: '#953800' },
];

const htmlEl         = document.documentElement;
let currentTheme     = localStorage.getItem('enc-theme') || 'light';
htmlEl.setAttribute('data-theme', currentTheme);

const themeDropdown  = document.getElementById('themeDropdown');
const themePickerBtn = document.getElementById('themePickerBtn');
const tpSwatch       = document.getElementById('tpSwatch');
const tpLabel        = document.getElementById('tpLabel');

function buildSwatchHTML(t) {
  return `<span style="display:flex;width:20px;height:20px;border-radius:4px;overflow:hidden;position:relative;background:${t.bg};">
    <span style="position:absolute;top:4px;left:4px;display:flex;flex-direction:column;gap:2px;">
      <span style="width:11px;height:2px;border-radius:1px;background:${t.key};"></span>
      <span style="width:8px;height:2px;border-radius:1px;background:${t.str};"></span>
      <span style="width:6px;height:2px;border-radius:1px;background:${t.num};"></span>
    </span>
  </span>`;
}

function updateActiveSwatch() {
  const t = THEMES.find(t => t.id === currentTheme) || THEMES[0];
  tpSwatch.innerHTML = buildSwatchHTML(t);
  tpLabel.textContent = t.name;
  themeDropdown.querySelectorAll('.theme-option').forEach(el =>
    el.classList.toggle('active', el.dataset.theme === currentTheme));
}

THEMES.forEach(t => {
  const opt = document.createElement('div');
  opt.className = 'theme-option';
  opt.dataset.theme = t.id;
  opt.innerHTML = `
    <div class="to-preview" style="background:${t.bg};">
      <span style="position:absolute;top:5px;left:6px;display:flex;flex-direction:column;gap:3px;">
        <span style="width:20px;height:2px;border-radius:1px;background:${t.key};"></span>
        <span style="width:14px;height:2px;border-radius:1px;background:${t.str};"></span>
        <span style="width:10px;height:2px;border-radius:1px;background:${t.num};"></span>
      </span>
    </div>
    <div><div class="to-name">${t.name}</div><div class="to-desc">${t.desc}</div></div>
    <span class="to-check">✓</span>
  `;
  opt.addEventListener('click', () => {
    currentTheme = t.id;
    htmlEl.setAttribute('data-theme', currentTheme);
    localStorage.setItem('enc-theme', currentTheme);
    updateActiveSwatch();
    closeThemeDropdown();
  });
  themeDropdown.appendChild(opt);
});

function closeThemeDropdown() {
  themeDropdown.classList.remove('open');
  themePickerBtn.classList.remove('open');
}

themePickerBtn.addEventListener('click', e => {
  e.stopPropagation();
  const isOpen = themeDropdown.classList.toggle('open');
  themePickerBtn.classList.toggle('open', isOpen);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.theme-picker')) closeThemeDropdown();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeThemeDropdown();
  // Ctrl/Cmd+Shift+C → copy output
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
    e.preventDefault();
    document.getElementById('btn-copy').click();
  }
  // Ctrl/Cmd+Shift+X → swap
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'X') {
    e.preventDefault();
    document.getElementById('btn-swap').click();
  }
  // Ctrl/Cmd+L → clear input
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
    e.preventDefault();
    document.getElementById('btn-clear').click();
  }
});

updateActiveSwatch();

// ── Diff mode ──────────────────────────────────────────────────────────────
(function initDiff() {
  const diffContainer = document.getElementById('diff-container');
  const diffInputB    = document.getElementById('diff-input-b');
  const diffResult    = document.getElementById('diff-result');
  const diffMeta      = document.getElementById('diff-meta');

  // Mark stale when either text changes
  diffInputB.addEventListener('input', () => {
    window._diffMarkStale?.();
  });

  window._diffMarkStale = function() {
    if (!diffResult.classList.contains('empty')) {
      diffContainer.classList.add('stale');
    }
    diffMeta.innerHTML = '';
    setStatus('Изменено — нажмите Сравнить');
    document.getElementById('char-count').textContent =
      `A: ${input.value.length} · B: ${diffInputB.value.length} chars`;
  };

  document.getElementById('btn-compare').addEventListener('click', () => {
    window.diffUpdate();
  });

  document.getElementById('btn-clear-b').addEventListener('click', () => {
    diffInputB.value = '';
    diffResult.innerHTML = 'Нажмите Сравнить…';
    diffResult.className = 'diff-result empty';
    diffContainer.classList.remove('stale');
    diffMeta.innerHTML = '';
    setStatus('Ready — введите тексты и нажмите Сравнить');
    document.getElementById('char-count').textContent = '';
    diffInputB.focus();
  });

  document.getElementById('btn-paste-b').addEventListener('click', async () => {
    try {
      diffInputB.value = await navigator.clipboard.readText();
      window._diffMarkStale?.();
    } catch {
      setStatus('Clipboard access denied — paste manually (Ctrl+V)', true);
      diffInputB.focus();
    }
  });

  window.diffUpdate = function() {
    if (currentMode !== 'diff') return;
    const textA = input.value;
    const textB = diffInputB.value;

    if (!textA && !textB) {
      diffResult.innerHTML = 'Нажмите Сравнить…';
      diffResult.className = 'diff-result empty';
      diffContainer.classList.remove('stale');
      diffMeta.innerHTML = '';
      setStatus('Ready — введите тексты и нажмите Сравнить');
      document.getElementById('char-count').textContent = '';
      return;
    }

    document.getElementById('char-count').textContent =
      `A: ${textA.length} · B: ${textB.length} chars`;

    const { html, ins, del, tooLong } = computeDiff(textA, textB);
    diffResult.innerHTML = html || '(пустой текст)';
    diffResult.className = 'diff-result';
    diffContainer.classList.remove('stale');

    let metaHtml = '';
    if (ins > 0) metaHtml += `<span class="diff-meta-ins">+${ins}</span> `;
    if (del > 0) metaHtml += `<span class="diff-meta-del">−${del}</span>`;
    if (!ins && !del) metaHtml = '<span style="color:var(--green)">Identical</span>';
    diffMeta.innerHTML = metaHtml;

    const msg = tooLong
      ? 'Слишком длинный — приблизительный diff'
      : (!ins && !del ? 'Тексты идентичны' : `+${ins} добавлено / −${del} удалено`);
    setStatus(msg);
    window._statsTrack?.('diff');
  };

  function computeDiff(textA, textB) {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const m = textA.length, n = textB.length;

    // Character-level LCS (limit: 2000×2000 = 4M ops)
    if (m > 2000 || n > 2000) {
      // Word-level fallback for long texts
      return computeWordDiff(textA, textB, esc);
    }

    // Full DP table for backtracking
    const table = new Array(m + 1);
    for (let i = 0; i <= m; i++) table[i] = new Int32Array(n + 1);
    for (let i = 1; i <= m; i++) {
      for (let j = 1; j <= n; j++) {
        table[i][j] = textA[i-1] === textB[j-1]
          ? table[i-1][j-1] + 1
          : Math.max(table[i-1][j], table[i][j-1]);
      }
    }

    // Backtrack
    const ops = [];
    let i = m, j = n;
    while (i > 0 || j > 0) {
      if (i > 0 && j > 0 && textA[i-1] === textB[j-1]) {
        ops.unshift({ t: 0, v: textA[i-1] }); i--; j--;
      } else if (i > 0 && (j === 0 || table[i-1][j] >= table[i][j-1])) {
        ops.unshift({ t: -1, v: textA[i-1] }); i--;
      } else {
        ops.unshift({ t: 1, v: textB[j-1] }); j--;
      }
    }

    // Merge adjacent same-type ops into runs
    const merged = [];
    for (const op of ops) {
      if (merged.length && merged[merged.length-1].t === op.t) {
        merged[merged.length-1].v += op.v;
      } else {
        merged.push({ t: op.t, v: op.v });
      }
    }

    // Render inline: eq=plain, del=red strikethrough, ins=green
    let html = '', ins = 0, del = 0;
    for (const op of merged) {
      if (op.t === 0) {
        html += esc(op.v);
      } else if (op.t === 1) {
        html += `<span class="diff-ins">${esc(op.v)}</span>`;
        ins++;
      } else {
        html += `<span class="diff-del">${esc(op.v)}</span>`;
        del++;
      }
    }
    return { html, ins, del };
  }

  function computeWordDiff(textA, textB, esc) {
    esc = esc || (s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
    const tokA = textA.match(/\S+|\s+/g) || [];
    const tokB = textB.match(/\S+|\s+/g) || [];
    if (tokA.length * tokB.length > 1000000) {
      return { html: esc(textB), ins: 0, del: 0, tooLong: true };
    }
    const m = tokA.length, n = tokB.length;
    const table = new Array(m + 1);
    for (let i = 0; i <= m; i++) table[i] = new Int32Array(n + 1);
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        table[i][j] = tokA[i-1] === tokB[j-1]
          ? table[i-1][j-1] + 1
          : Math.max(table[i-1][j], table[i][j-1]);
    const ops = [];
    let i = m, j = n;
    while (i > 0 || j > 0) {
      if (i > 0 && j > 0 && tokA[i-1] === tokB[j-1]) {
        ops.unshift({ t: 0, v: tokA[i-1] }); i--; j--;
      } else if (i > 0 && (j === 0 || table[i-1][j] >= table[i][j-1])) {
        ops.unshift({ t: -1, v: tokA[i-1] }); i--;
      } else {
        ops.unshift({ t: 1, v: tokB[j-1] }); j--;
      }
    }
    let html = '', ins = 0, del = 0;
    for (const op of ops) {
      if (op.t === 0)       html += esc(op.v);
      else if (op.t === 1) { html += `<span class="diff-ins">${esc(op.v)}</span>`; ins++; }
      else                 { html += `<span class="diff-del">${esc(op.v)}</span>`; del++; }
    }
    return { html, ins, del };
  }
})();

  // ── STATS ─────────────────────────────────────────────────────────────────
  (function initStats() {
    const LS = 'enc_stats';
    const LU = 'enc_uid';
    const MODES_LIST = ['base64-enc','base64-dec','url-enc','url-dec','hash','hex-enc','hex-dec','jwt','ascii-dec','diff'];

    let uid = localStorage.getItem(LU);
    if (!uid) { uid = Math.random().toString(36).slice(2, 10); localStorage.setItem(LU, uid); }

    let stats;
    try { stats = JSON.parse(localStorage.getItem(LS)) || {}; } catch { stats = {}; }
    if (!stats.sessions) stats.sessions = 0;
    if (!stats.uids)     stats.uids     = [];
    if (!stats.actions)  stats.actions  = {};
    MODES_LIST.forEach(m => { if (!stats.actions[m]) stats.actions[m] = 0; });

    if (!stats.uids.includes(uid)) stats.uids.push(uid);
    stats.users = stats.uids.length;
    stats.sessions++;

    function save() { localStorage.setItem(LS, JSON.stringify(stats)); }
    save();

    function totalUsages() { return Object.values(stats.actions).reduce((a, b) => a + b, 0); }

    function updateDisplay() {
      const total = totalUsages();
      document.getElementById('spUsers').textContent    = stats.users;
      document.getElementById('spSessions').textContent = stats.sessions;
      document.getElementById('spUsages').textContent   = total;
      document.getElementById('stUsers').textContent    = stats.users;
      document.getElementById('stSessions').textContent = stats.sessions;
      document.getElementById('stTotal').textContent    = total;
      MODES_LIST.forEach(m => {
        const el = document.getElementById('st-' + m);
        if (el) el.textContent = stats.actions[m] || 0;
      });
    }

    updateDisplay();

    window._statsTrack = function(mode) {
      if (!mode || !MODES_LIST.includes(mode)) return;
      stats.actions[mode] = (stats.actions[mode] || 0) + 1;
      save();
      updateDisplay();
    };
  })();
</script>
